<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners effect using a rect -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="192" height="192" rx="45" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Game controller icon -->
  <g transform="translate(96, 96)">
    <!-- Controller body -->
    <ellipse cx="0" cy="0" rx="50" ry="35" fill="#fff" opacity="0.95"/>
    
    <!-- Left D-Pad -->
    <g transform="translate(-35, -15)">
      <circle cx="0" cy="0" r="4" fill="#110f2f"/>
      <rect x="-2" y="-8" width="4" height="16" fill="#110f2f"/>
      <rect x="-8" y="-2" width="16" height="4" fill="#110f2f"/>
    </g>
    
    <!-- Right action buttons -->
    <g transform="translate(35, -15)">
      <circle cx="-6" cy="-6" r="5" fill="#ff9800"/>
      <circle cx="6" cy="-6" r="5" fill="#4caf50"/>
      <circle cx="0" cy="6" r="5" fill="#2196f3"/>
      <circle cx="-12" cy="0" r="5" fill="#f44336"/>
    </g>
    
    <!-- Center button -->
    <circle cx="0" cy="0" r="6" fill="#110f2f"/>
    
    <!-- Bottom accent stripe -->
    <rect x="-45" y="25" width="90" height="6" fill="#110f2f" opacity="0.2" rx="3"/>
  </g>
  
  <!-- App icon shine effect -->
  <ellipse cx="50" cy="50" rx="40" ry="35" fill="#fff" opacity="0.15"/>
</svg>